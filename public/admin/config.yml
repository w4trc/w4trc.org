# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: w4trc/w4trc.org
  base_url: https://sveltia-cms-auth.joshuahcarmack.workers.dev/

media_folder: /public/images
public_folder: /images

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }
  - name: silentKeys
    label: Silent Keys
    label_singular: Silent Key
    folder: /content/silentKeys
    fields:
      - { label: Name, name: name, widget: string, required: true }
      - { label: Callsign, name: callsign, widget: string, required: true }
      - { label: Years, name: years, widget: string, required: true }
      - { label: Description, name: description, widget: string }
      - { label: Obituary URL, name: obituaryUrl, widget: string, type: url }


  